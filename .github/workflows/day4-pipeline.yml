# Day 4 module: multi-stage CI with unit → integration ordering, artefacts on failure.
# See lab4/README.md and lab4/reference-workflows/ for Jenkins / Azure equivalents.

name: Day 4 — Lab2 multi-stage tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (exclude integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab2/maven-junit5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit tests
        run: |
          chmod +x mvnw
          ./mvnw -B test -DexcludedGroups=integration

      - name: Upload Surefire XML (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-unit-${{ github.run_id }}
          path: lab2/maven-junit5/target/surefire-reports/
          if-no-files-found: warn

  integration-tests:
    name: Integration tests
    needs: unit-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab2/maven-junit5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run integration-tagged tests
        run: |
          chmod +x mvnw
          ./mvnw -B test -Dgroups=integration

      - name: Upload Surefire XML (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-integration-${{ github.run_id }}
          path: lab2/maven-junit5/target/surefire-reports/
          if-no-files-found: warn
