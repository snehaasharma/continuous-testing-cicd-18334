version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: ${DB_PASS:-secret}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "testuser"]
      interval: 5s
      retries: 5

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/testdb
      DB_USER: testuser
      DB_PASS: ${DB_PASS:-secret}
