# Day 6 — ephemeral Postgres + test-runner on Compose network (no fixed host ports).
# From repo root: docker compose -f lab6/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test-runner
# Teardown: docker compose -f lab6/docker-compose.test.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: ${DB_PASS:-testpass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata_lab6:/var/lib/postgresql/data
      - ./maven-docker-demo/src/test/resources/data:/docker-entrypoint-initdb.d:ro

  test-runner:
    build:
      context: ./maven-docker-demo
      dockerfile: Dockerfile.test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/testdb
      DB_USER: testuser
      DB_PASS: ${DB_PASS:-testpass}

volumes:
  pgdata_lab6:
