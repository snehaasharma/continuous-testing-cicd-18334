# Template aligned with Day 6 slides — Spring teams map these to spring.datasource.*.
# This lab uses JDBC from env vars directly in tests; values here document the contract.
#
# docker-compose / CI inject:
#   DB_URL=jdbc:postgresql://postgres:5432/testdb
#   DB_USER=testuser
#   DB_PASS=<from secret or default in compose>
#
# Local fallback (no Docker): leave unset — PostgresSeedDataTest is skipped.
db.url=${DB_URL:jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1}
db.user=${DB_USER:sa}
db.pass=${DB_PASS:}

app.notifications.enabled=false
app.payment.gateway=sandbox
